<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Browser Guard Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <img src="icons/icon48.png" class="logo" alt="AI Guard">
      <div>
        <h1>⚙️ Settings</h1>
        <div class="status" id="status">Loading...</div>
      </div>
    </div>

    <!-- Main Settings -->
    <div class="settings-grid">
      
      <!-- Protection Level -->
      <div class="setting-group">
        <h3>🛡️ Protection Level</h3>
        <div class="slider-container">
          <label>Normal</label>
          <input type="range" id="protectionLevel" min="1" max="3" value="2">
          <label id="protectionLabel">Aggressive</label>
        </div>
        <small>1 = Light, 3 = Maximum blocking</small>
      </div>

      <!-- Categories -->
      <div class="setting-group">
        <h3>📂 Auto-Categorize</h3>
        <label class="toggle">
          <input type="checkbox" id="autoCategorize" checked>
          <span class="toggle-slider"></span>
          <span>Study, Hackathons, Movies</span>
        </label>
      </div>

      <!-- Notifications -->
      <div class="setting-group">
        <h3>🔔 Notifications</h3>
        <label class="toggle">
          <input type="checkbox" id="smartReminders" checked>
          <span class="toggle-slider"></span>
          <span>Usage-based reminders</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="blockNotifications">
          <span class="toggle-slider"></span>
          <span>Block ad notifications</span>
        </label>
      </div>

      <!-- Privacy -->
      <div class="setting-group">
        <h3>🔐 Privacy</h3>
        <label class="toggle">
          <input type="checkbox" id="autoPrivacy" checked>
          <span class="toggle-slider"></span>
          <span>Auto-shield sensitive tabs</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="cookieProtection">
          <span class="toggle-slider"></span>
          <span>Block tracking cookies</span>
        </label>
      </div>

    </div>

    <!-- Stats Overview -->
    <div class="stats-section">
      <h3>📊 Lifetime Stats</h3>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-number" id="totalAds">0</div>
          <div>Ads Blocked</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="totalLinks">0</div>
          <div>Links Blocked</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="totalPages">0</div>
          <div>Pages Protected</div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="resetAll" class="btn danger">🔄 Reset All</button>
      <button id="saveSettings" class="btn primary">💾 Save Settings</button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <small>v1.0.0 • Made for hackathons 🚀</small>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
