<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="AI Guard">
    <h2>AI Browser Guard</h2>
  </div>
  
  <div class="stats">
    <div class="stat">
      <span class="number" id="adsBlocked">0</span>
      <span class="label">Ads Blocked</span>
    </div>
    <div class="stat">
      <span class="number" id="pagesProtected">0</span>
      <span class="label">Pages Protected</span>
    </div>
  </div>
  
  <div class="current-page">
    <h3>Current Page</h3>
    <div id="pageInfo">Analyzing...</div>
  </div>
  
  <div class="controls">
    <button id="privacyToggle">🔒 Privacy Mode</button>
    <button id="clearData">🗑️ Clear Data</button>
  </div>
  
  <div class="footer">
    <small>v1.0.0 - Hackathon Winner 🚀</small>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
